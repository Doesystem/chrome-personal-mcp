services:
  chrome-mcp:
    build: .
    container_name: chrome-personal-mcp
    env_file: .env
    volumes:
      - ./data:/data
    ports:
      - "${HTTP_PORT:-3000}:${HTTP_PORT:-3000}"  # MCP HTTP endpoint
      - "6080:6080"                               # noVNC (debug mode only)
      - "127.0.0.1:5900:5900"                     # raw VNC (debug mode only)
    shm_size: '1gb'
