services:
  chrome-mcp:
    build: .
    container_name: chrome-personal-mcp
    environment:
      - MODE=debug            # set to debug to enable Xvfb + VNC + noVNC
      - MCP_SECRET=           # auth token required on every MCP tool call
      - VNC_PASSWORD=         # x11vnc password (raw VNC port 5900)
                              # noVNC password is handled by nginx basic auth
    volumes:
      - ./data:/data
    ports:
      # noVNC web UI — http://localhost:6080/vnc.html (protect with nginx basic auth)
      - "6080:6080"
      # Raw VNC — localhost only, use SSH tunnel for remote access
      - "127.0.0.1:5900:5900"
    shm_size: '1gb'
